services:
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - ./:/prom-file:rw
    networks: 
      monitoring:
    command:
          - '--collector.disable-defaults'
          - '--collector.meminfo'   # Gets your RAM metrics
          - '--collector.cpu'       # Gets your CPU metrics
          - '--collector.loadavg'   # Gets system load averages
          - '--collector.stat'      # Gets basic system stats (boot time, etc.)
          - '--collector.filesystem'
          - '--collector.textfile'
          - '--collector.textfile.directory=/prom-file'
          
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    networks:
     monitoring:


  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    # restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      monitoring:

volumes:
  grafana-storage:

networks:
  monitoring:
    driver: bridge

