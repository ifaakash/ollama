global:
  scrape_interval: 15s # How often to scrape data

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090'] # Prometheus tracking its own health

  - job_name: 'pi5_system_metrics'
    static_configs:
      - targets: ['node-exporter:9100'] # Pointing to the Node Exporter container
