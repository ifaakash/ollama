services:
  litellm:
    image: ghcr.io/berriai/litellm-database:main-stable
    container_name: lite_llm
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LITELLM_MASTER_KEY=qwertyuiop
      - DATABASE_URL=postgresql://litellm:supersecretpassword@postgres:5432/litellmdb
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command:
      - --config
      - /app/config.yaml
      - --detailed_debug
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=supersecretpassword
      - POSTGRES_DB=litellmdb
    ports:
      - "5431:5432"
    volumes:
      - litellm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellmdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  litellm_pgdata:
