services:
   litellm:
     image: ghcr.io/berriai/litellm:main-stable
     container_name: lite_llm
     ports:
      - "4000:4000"
     extra_hosts:
      - "host.docker.internal:host-gateway"
     environment:
       LITELLM_MASTER_KEY: "qwertyuiop" 
     volumes:
      - ./litellm_config.yaml:/app/config.yaml
     command:
      - --config
      - /app/config.yaml
      - --detailed_debug
